<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>тык</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
    }
    body {
      background: #1d3b1d;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 15px;
    }
    .w {
      max-width: 1300px;
      width: 100%;
      background: #f5e6d3;
      border-radius: 70px 70px 40px 40px;
      border: 6px solid #c49a6c;
      box-shadow: 0 25px 0 #8b5a2b, 0 30px 30px #00000066;
      padding: 25px;
    }
    .h {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #4a2c1a;
      padding: 15px 25px;
      border-radius: 60px;
      margin-bottom: 20px;
      border: 4px solid #c49a6c;
      flex-wrap: wrap;
      gap: 15px;
    }
    .pi {
      display: flex;
      align-items: center;
      gap: 15px;
      flex-wrap: wrap;
    }
    .pn {
      background: #ffd966;
      padding: 10px 20px;
      border-radius: 40px;
      font-size: 1.2em;
      font-weight: bold;
      color: #4a2c1a;
      border: 3px solid #b87c3a;
      cursor: pointer;
    }
    .pb {
      background: #8b5a2b;
      color: #ffd966;
      padding: 8px 18px;
      border-radius: 30px;
      font-weight: bold;
      border: 3px solid #c49a6c;
      font-size: 1.1em;
    }
    .sh {
      background: #c49a6c;
      padding: 10px 25px;
      border-radius: 40px;
      font-size: 1.4em;
      font-weight: bold;
      color: #2c1a0e;
      border: 3px solid #8b5a2b;
    }
    .mg {
      display: grid;
      grid-template-columns: 1.5fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }
    .cs {
      background: #c49a6c;
      padding: 20px;
      border-radius: 50px;
      border: 5px solid #8b5a2b;
      text-align: center;
    }
    .bc {
      background: #6b8c42;
      border-radius: 80px;
      padding: 20px;
      margin: 15px 0;
      border: 5px dashed #f5e6d3;
      cursor: pointer;
      transition: all 0.1s;
      position: relative;
      overflow: hidden;
    }
    .bc:active {
      transform: scale(0.96);
      background: #5a7a35;
    }
    .be {
      font-size: 140px;
      line-height: 1;
      filter: drop-shadow(8px 10px 0 #3d5a2b);
      transition: transform 0.1s;
      pointer-events: none;
    }
    .ce {
      position: absolute;
      pointer-events: none;
      font-size: 30px;
      animation: f 1s ease-out forwards;
      z-index: 10;
      color: #ffd966;
      font-weight: bold;
      text-shadow: 2px 2px 0 #000;
    }
    @keyframes f {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-100px) scale(1.5); }
    }
    .st {
      display: flex;
      justify-content: space-around;
      background: #4a2c1a;
      color: #ffd966;
      padding: 15px;
      border-radius: 40px;
      margin: 15px 0;
      font-weight: bold;
      font-size: 1.1em;
    }
    .si {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }
    .sv {
      font-size: 1.3em;
      color: #fff;
    }
    .ss {
      background: #4a2c1a;
      padding: 20px;
      border-radius: 50px;
      border: 5px solid #c49a6c;
      color: #f5e6d3;
    }
    .tt {
      font-size: 1.6em;
      text-align: center;
      color: #ffd966;
      margin-bottom: 15px;
      text-shadow: 3px 3px 0 #8b5a2b;
    }
    .sg {
      display: grid;
      gap: 10px;
      margin-bottom: 20px;
      max-height: 300px;
      overflow-y: auto;
      padding-right: 5px;
    }
    .si2 {
      background: #2c1a0e;
      padding: 12px;
      border-radius: 30px;
      display: flex;
      align-items: center;
      gap: 12px;
      border: 3px solid #c49a6c;
      cursor: pointer;
      transition: 0.2s;
    }
    .si2:hover {
      transform: translateX(5px);
      border-color: #ffd966;
    }
    .si2.sel {
      border: 4px solid #ffd966;
      background: #3d2a1a;
      box-shadow: 0 0 15px #ffd966;
    }
    .se {
      font-size: 2.2em;
    }
    .sif {
      flex: 1;
    }
    .sn {
      font-weight: bold;
    }
    .sp {
      color: #ffd966;
      font-size: 0.9em;
    }
    .bb {
      background: #ffd966;
      border: none;
      padding: 6px 12px;
      border-radius: 20px;
      font-weight: bold;
      cursor: pointer;
      border-bottom: 3px solid #b87c3a;
      transition: 0.1s;
    }
    .bb:active {
      transform: translateY(2px);
      border-bottom-width: 1px;
    }
    .bb:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .us {
      background: #8b5a2b;
      padding: 20px;
      border-radius: 40px;
      margin-top: 20px;
    }
    .ug {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin: 15px 0;
    }
    .uc {
      background: #4a2c1a;
      padding: 15px;
      border-radius: 25px;
      border: 3px solid #c49a6c;
      color: #f5e6d3;
      cursor: pointer;
      transition: all 0.2s;
    }
    .uc:hover {
      transform: translateY(-3px);
      border-color: #ffd966;
      box-shadow: 0 5px 15px #0000004d;
    }
    .uc.dis {
      opacity: 0.5;
      pointer-events: none;
      filter: grayscale(0.5);
    }
    .un {
      font-weight: bold;
      font-size: 1.1em;
      color: #ffd966;
    }
    .ud {
      font-size: 0.9em;
      margin: 5px 0;
    }
    .up {
      color: #ffd966;
      font-weight: bold;
      font-size: 1.1em;
    }
    .ul {
      font-size: 0.8em;
      color: #c49a6c;
    }
    .su {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 15px;
    }
    .sc {
      background: #4a2c1a;
      padding: 12px;
      border-radius: 20px;
      border: 3px solid gold;
      text-align: center;
      cursor: pointer;
    }
    .sc.dis {
      opacity: 0.5;
      pointer-events: none;
    }
    .pb2 {
      width: 100%;
      background: linear-gradient(145deg, #b22222, #8b1a1a);
      border: none;
      font-size: 1.3em;
      font-weight: bold;
      padding: 15px;
      border-radius: 40px;
      border-bottom: 6px solid #6b1a1a;
      color: #ffd966;
      cursor: pointer;
      margin-top: 15px;
      transition: 0.1s;
    }
    .pb2:active {
      transform: translateY(3px);
      border-bottom-width: 3px;
    }
    .pb2:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .as {
      background: #2c1a0e;
      border-radius: 40px;
      padding: 20px;
      border: 5px solid #c49a6c;
      margin: 20px 0;
    }
    .ag {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-top: 15px;
    }
    .ac {
      background: #4a2c1a;
      padding: 10px;
      border-radius: 20px;
      text-align: center;
      border: 2px solid #c49a6c;
      transition: 0.2s;
    }
    .ac.unl {
      border-color: gold;
      background: #5a3a2a;
      box-shadow: 0 0 10px gold;
    }
    .ae {
      font-size: 2em;
    }
    .an {
      font-size: 0.8em;
      color: #ffd966;
    }
    .lb {
      background: #2c1a0e;
      border-radius: 40px;
      padding: 20px;
      border: 5px solid #c49a6c;
      margin-top: 20px;
    }
    .lb h2 {
      color: #ffd966;
      font-size: 1.8em;
      text-align: center;
      margin-bottom: 15px;
    }
    .lb table {
      width: 100%;
      border-collapse: collapse;
      color: #f5e6d3;
    }
    .lb th {
      background: #4a2c1a;
      padding: 12px;
      color: #ffd966;
    }
    .lb td {
      padding: 10px;
      text-align: center;
      border-bottom: 2px solid #8b5a2b;
    }
    .fp { color: gold; font-weight: bold; }
    .sp2 { color: silver; }
    .tp { color: #cd7f32; }
    .ft {
      display: flex;
      justify-content: space-between;
      margin-top: 20px;
      flex-wrap: wrap;
      gap: 10px;
    }
    .fb {
      background: #b87c3a;
      border: none;
      color: #2c1a0e;
      padding: 10px 20px;
      border-radius: 30px;
      font-weight: bold;
      cursor: pointer;
      border-bottom: 4px solid #6b4a2a;
      transition: 0.1s;
      flex: 1;
      min-width: 120px;
    }
    .fb:active {
      transform: translateY(2px);
      border-bottom-width: 2px;
    }
  </style>
</head>
<body>
<div class="w">
  <div class="h">
    <div class="pi">
      <div class="pn" id="a0">Игрок</div>
      <div class="pb" id="a1">🌟 Престиж: 0</div>
      <div class="pb" id="a2">🖱️ 0</div>
    </div>
    <div class="sh" id="a3">💰 0</div>
  </div>
  <div class="mg">
    <div class="cs">
      <div class="bc" id="b0">
        <div class="be" id="b1">🦫</div>
      </div>
      <div class="st">
        <div class="si"><span>⚡</span><span class="sv" id="b2">1</span></div>
        <div class="si"><span>🔄</span><span class="sv" id="b3">0/с</span></div>
        <div class="si"><span>💥</span><span class="sv" id="b4">0%</span></div>
        <div class="si"><span>🍀</span><span class="sv" id="b5">0%</span></div>
      </div>
      <div class="st" style="margin-top:10px">
        <div class="si"><span>💰/тык</span><span class="sv" id="b6">1</span></div>
        <div class="si"><span>⏱️/с</span><span class="sv" id="b7">0</span></div>
      </div>
    </div>
    <div class="ss">
      <div class="tt">🏪 МАГАЗИН</div>
      <div class="sg" id="c0"></div>
      <div class="us">
        <div class="tt">⚡ АПГРЕЙДЫ</div>
        <div class="ug" id="d0"></div>
        <div class="tt">✨ ОСОБЫЕ</div>
        <div class="su" id="e0"></div>
      </div>
      <button class="pb2" id="f0">🌟 ПРЕСТИЖ (10000💰)</button>
    </div>
  </div>
  <div class="as">
    <div class="tt">🏆 ДОСТИЖЕНИЯ</div>
    <div class="ag" id="g0"></div>
  </div>
  <div class="lb">
    <h2>🏆 ТОП</h2>
    <table>
      <thead><tr><th>#</th><th>Имя</th><th>💰</th><th>🌟</th><th>🖱️</th><th>🎨</th></tr></thead>
      <tbody id="h0"></tbody>
    </table>
  </div>
  <div class="ft">
    <button class="fb" id="i0">✏️ Имя</button>
    <button class="fb" id="i1">🔄 Сброс</button>
    <button class="fb" id="i2">📤 Позвать</button>
    <button class="fb" id="i3">💾 Save</button>
    <button class="fb" id="i4">📂 Load</button>
  </div>
</div>
<script>
  (function(){
    let A = localStorage;
    let B = 'bobr';
    let C = {
      n: A.getItem(B+'Name') || 'Игрок',
      s: parseFloat(A.getItem(B+'Score')) || 0,
      p: parseInt(A.getItem(B+'Prestige')) || 0,
      k: A.getItem(B+'Skin') || '🦫',
      t: parseInt(A.getItem(B+'Clicks')) || 0
    };
    let D = [
      {e:'🦫',n:'Бобр',p:0},{e:'🐹',n:'Хомяк',p:100},{e:'🐼',n:'Панда',p:250},{e:'🦊',n:'Лис',p:500},{e:'🐸',n:'Ква',p:750},{e:'🐲',n:'Дракон',p:1000},{e:'👽',n:'Инопл',p:1500},{e:'💎',n:'Алмаз',p:2000},{e:'👑',n:'Король',p:3000},{e:'🌈',n:'Радуга',p:5000},{e:'⚡',n:'Молния',p:7500},{e:'🔥',n:'Огонь',p:10000},{e:'❄️',n:'Лёд',p:15000},{e:'🌍',n:'Космос',p:20000},{e:'🤖',n:'Робот',p:25000},{e:'🎮',n:'Геймер',p:30000},{e:'⚽',n:'Спорт',p:35000},{e:'🍕',n:'Пицца',p:40000},{e:'🎸',n:'Рок',p:45000},{e:'💀',n:'Смерть',p:50000}
    ];
    let E = new Set(JSON.parse(A.getItem(B+'Skins')) || ['🦫']);
    let F = {
      a: parseInt(A.getItem('u_a')) || 1,
      b: parseInt(A.getItem('u_b')) || 0,
      c: parseInt(A.getItem('u_c')) || 0,
      d: parseFloat(A.getItem('u_d')) || 2,
      e: parseInt(A.getItem('u_e')) || 0,
      f: parseInt(A.getItem('u_f')) || 0,
      g: parseInt(A.getItem('u_g')) || 0,
      h: parseInt(A.getItem('u_h')) || 0
    };
    let G = JSON.parse(A.getItem('ach')) || [];
    let H = JSON.parse(A.getItem('lead')) || [];
    let I = {
      a0: document.getElementById('a0'),
      a1: document.getElementById('a1'),
      a2: document.getElementById('a2'),
      a3: document.getElementById('a3'),
      b0: document.getElementById('b0'),
      b1: document.getElementById('b1'),
      b2: document.getElementById('b2'),
      b3: document.getElementById('b3'),
      b4: document.getElementById('b4'),
      b5: document.getElementById('b5'),
      b6: document.getElementById('b6'),
      b7: document.getElementById('b7'),
      c0: document.getElementById('c0'),
      d0: document.getElementById('d0'),
      e0: document.getElementById('e0'),
      g0: document.getElementById('g0'),
      h0: document.getElementById('h0')
    };
    function J() {
      let K = 1 + (C.p * 0.1);
      I.a0.textContent = C.n;
      I.a1.textContent = `🌟 Престиж: ${C.p}`;
      I.a2.textContent = `🖱️ ${C.t}`;
      I.a3.textContent = `💰 ${Math.floor(C.s)}`;
      I.b2.textContent = F.a;
      I.b3.textContent = F.b;
      I.b4.textContent = F.c + '%';
      I.b5.textContent = F.e + '%';
      I.b6.textContent = Math.floor(F.a * K);
      I.b7.textContent = Math.floor(F.b * K);
      I.b1.textContent = C.k;
      L();
      M();
      N();
      O();
      P();
    }
    function P() {
      A.setItem(B+'Name', C.n);
      A.setItem(B+'Score', C.s);
      A.setItem(B+'Prestige', C.p);
      A.setItem(B+'Skin', C.k);
      A.setItem(B+'Skins', JSON.stringify([...E]));
      A.setItem(B+'Clicks', C.t);
      A.setItem('u_a', F.a);
      A.setItem('u_b', F.b);
      A.setItem('u_c', F.c);
      A.setItem('u_d', F.d);
      A.setItem('u_e', F.e);
      A.setItem('u_f', F.f);
      A.setItem('u_g', F.g);
      A.setItem('u_h', F.h);
      A.setItem('ach', JSON.stringify(G));
      Q();
    }
    function Q() {
      let R = H.findIndex(x=>x.n===C.n);
      let S = {n:C.n, s:Math.floor(C.s), p:C.p, t:C.t, k:C.k};
      if(R!==-1) H[R]=S; else H.push(S);
      H.sort((x,y)=>y.s-x.s);
      H = H.slice(0,10);
      A.setItem('lead', JSON.stringify(H));
      I.h0.innerHTML = '';
      H.forEach((x,i)=>{
        let T = document.createElement('tr');
        let U = '';
        if(i===0) U='fp'; else if(i===1) U='sp2'; else if(i===2) U='tp';
        T.innerHTML = `<td class="${U}">${i+1}</td><td>${x.n}${x.n===C.n?'⭐':''}</td><td>${x.s}</td><td>${x.p}</td><td>${x.t}</td><td style="font-size:1.4em">${x.k}</td>`;
        I.h0.appendChild(T);
      });
    }
    function V(e, x, y, t) {
      let W = document.createElement('div');
      W.className = 'ce';
      W.textContent = t;
      W.style.left = (x-20)+'px';
      W.style.top = (y-20)+'px';
      I.b0.appendChild(W);
      setTimeout(()=>W.remove(), 1000);
    }
    I.b0.addEventListener('click', function(e){
      let X = e.clientX - I.b0.getBoundingClientRect().left;
      let Y = e.clientY - I.b0.getBoundingClientRect().top;
      let Z = F.a * (1 + C.p*0.1);
      let AA = '';
      if(Math.random()*100 < F.c) { Z *= F.d; AA = '💥 КРИТ!'; }
      if(F.g>0 && Math.random()*100<5) { Z *= 5; AA = '💀 МЕГА!'; }
      if(Math.random()*100 < F.e) { Z = Math.floor(Z*1.5); AA = '🍀 УДАЧА!'; }
      if(F.h>0 && Math.random()*100<10) { Z += F.b*5; AA = '⛓️ ЦЕПЬ!'; }
      if(F.f>0 && Math.random()*100<15) { Z *= 2; AA = '2️⃣ ДВОЙНОЙ!'; }
      C.s += Math.floor(Z);
      C.t++;
      V(X, Y, `+${Math.floor(Z)}💰 ${AA}`);
      I.b1.style.transform = 'scale(0.9)';
      setTimeout(()=>I.b1.style.transform = 'scale(1)', 100);
      if(Math.random()<0.1) {
        let AB = ['✨','💥','⭐','🔥','💫','🎉'];
        I.b1.textContent = AB[Math.floor(Math.random()*AB.length)];
        setTimeout(()=>I.b1.textContent = C.k, 100);
      }
      AC();
      J();
    });
    setInterval(()=>{
      if(F.b>0) {
        let AD = F.b * (1 + C.p*0.1);
        C.s += Math.floor(AD);
        J();
      }
    }, 1000);
    function L() {
      I.c0.innerHTML = '';
      D.forEach(s=>{
        let AE = E.has(s.e);
        let AF = C.k === s.e;
        let AG = document.createElement('div');
        AG.className = `si2 ${AF?'sel':''}`;
        AG.innerHTML = `<span class="se">${s.e}</span><div class="sif"><div class="sn">${s.n}</div><div class="sp">${s.p===0?'Старт':s.p+'💰'}</div></div>${!AE?'<button class="bb" data-e="'+s.e+'" data-p="'+s.p+'">Купить</button>':''}`;
        if(AE) AG.addEventListener('click', (e)=>{
          if(!e.target.classList.contains('bb')) { C.k = s.e; J(); }
        });
        I.c0.appendChild(AG);
      });
      document.querySelectorAll('.bb').forEach(b=>{
        b.addEventListener('click', (e)=>{
          e.stopPropagation();
          let AH = b.dataset.e;
          let AI = parseInt(b.dataset.p);
          if(C.s >= AI) {
            C.s -= AI;
            E.add(AH);
            C.k = AH;
            J();
          }
        });
      });
    }
    function M() {
      let AJ = [
        {i:'a',n:'💪 Сила',d:'Больше за тык',b:50,m:30,v:F.a,x:100},
        {i:'b',n:'🤖 Авто',d:'💰/сек',b:100,m:75,v:F.b,x:50},
        {i:'c',n:'⚡ Крит',d:'Шанс х2',b:200,m:100,v:F.c,x:75},
        {i:'e',n:'🍀 Удача',d:'Шанс х1.5',b:150,m:50,v:F.e,x:50}
      ];
      I.d0.innerHTML = '';
      AJ.forEach(u=>{
        let AK = Math.floor(u.b + (u.v * u.m));
        let AL = document.createElement('div');
        AL.className = `uc ${C.s<AK||u.v>=u.x?'dis':''}`;
        AL.innerHTML = `<div class="un">${u.n}</div><div class="ud">${u.d}</div><div class="ul">Ур: ${u.v}/${u.x}</div><div class="up">${AK}💰</div>`;
        AL.addEventListener('click', ()=>{
          if(C.s >= AK && u.v < u.x) {
            C.s -= AK;
            F[u.i] = u.v + 1;
            J();
          }
        });
        I.d0.appendChild(AL);
      });
    }
    function N() {
      let AM = [
        {i:'f',n:'2️⃣ Двойной',d:'15% х2',p:1000,v:F.f,x:5},
        {i:'g',n:'💀 Мега',d:'5% х5',p:2500,v:F.g,x:3},
        {i:'h',n:'⛓️ Цепь',d:'10% +авто',p:5000,v:F.h,x:2}
      ];
      I.e0.innerHTML = '';
      AM.forEach(u=>{
        let AN = document.createElement('div');
        AN.className = `sc ${C.s<u.p||u.v>=u.x?'dis':''}`;
